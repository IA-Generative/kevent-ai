service:
  type: "${SERVICE_TYPE}"
  result_topic: ""    # auto-dérivé: "jobs.{model}.results" si vide (ex: jobs.whisper-large-v3.results)
  # Pas de max_concurrency : géré par containerConcurrency dans le Knative Service spec.

kafka:
  brokers: ["${KAFKA_BROKERS:-kafka:9092}"]
  sasl:
    mechanism: "${KAFKA_SASL_MECHANISM:-}"
    username:  "${KAFKA_SASL_USERNAME:-}"
    password:  "${KAFKA_SASL_PASSWORD:-}"
  tls:
    enabled:      ${KAFKA_TLS_ENABLED:-false}
    ca_cert_path: "${KAFKA_CA_CERT_PATH:-}"

encryption:
  # Must match the key configured on the gateway.
  key: "${ENCRYPTION_KEY:-}"

s3:
  endpoint:   "${S3_ENDPOINT:-https://s3.fr-par.scw.cloud}"
  region:     "${S3_REGION:-fr-par}"
  access_key: "${S3_ACCESS_KEY}"
  secret_key: "${S3_SECRET_KEY}"
  bucket:     "${S3_BUCKET:-kevent-jobs}"

# Base URL du container d'inférence local (sidecar dans le même pod).
# Le chemin OpenAI (ex: /v1/audio/transcriptions) est fourni par le gateway dans InputEvent.InferenceURL
# et appendé dynamiquement : inference.base_url + event.inference_url.
# INFERENCE_PORT est le port du serveur de modèle dans le pod.
inference:
  base_url: "http://127.0.0.1:${INFERENCE_PORT:-9000}"
  api_key:  ""      # pas d'auth sur localhost
  timeout:  "300s"

# Paramètres spécifiques par type de service (format de la requête, options modèle).
# model et endpoint_url ne sont plus nécessaires : ils viennent de l'InputEvent.
transcription:
  language:        ""
  response_format: "json"

diarization:
  num_speakers: 0    # 0 = auto-detect

ocr:
  prompt:     "Extract all text visible in this document. Return only the extracted text."
  max_tokens: 4096
