service:
  # Topic where result events are published. Must match the gateway's result_topic
  # for this model (e.g. jobs.whisper-large-v3.results).
  result_topic: "${RESULT_TOPIC}"

kafka:
  brokers: ["${KAFKA_BROKERS:-kafka:9092}"]
  sasl:
    mechanism: "${KAFKA_SASL_MECHANISM:-}"
    username:  "${KAFKA_SASL_USERNAME:-}"
    password:  "${KAFKA_SASL_PASSWORD:-}"
  tls:
    enabled:      ${KAFKA_TLS_ENABLED:-false}
    ca_cert_path: "${KAFKA_CA_CERT_PATH:-}"

encryption:
  # Must match the key configured on the gateway.
  key: "${ENCRYPTION_KEY:-}"

s3:
  endpoint:   "${S3_ENDPOINT:-https://s3.fr-par.scw.cloud}"
  region:     "${S3_REGION:-fr-par}"
  access_key: "${S3_ACCESS_KEY}"
  secret_key: "${S3_SECRET_KEY}"
  bucket:     "${S3_BUCKET:-kevent-jobs}"

# Local inference endpoint (sidecar in the same pod).
# INFERENCE_PORT is the port of the model server in the pod.
# The OpenAI path (e.g. /v1/audio/transcriptions) is provided per-event by the
# gateway (InputEvent.inference_url) and appended at runtime:
#   final URL = base_url + inference_url
#
# extra_fields: optional form fields added to every multipart request.
# Use them to pass model-specific parameters (empty values are skipped).
inference:
  base_url: "http://127.0.0.1:${INFERENCE_PORT:-9000}"
  api_key:  ""
  timeout:  "300s"
  extra_fields:
    response_format: "json"
    # language: "fr"
    # prompt: "Extract all text visible in this document."
